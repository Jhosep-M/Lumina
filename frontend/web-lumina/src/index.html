<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>LUMINA</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    /* Oculta el contenido hasta que Angular arranque */
    app-root:empty + .loading {
      display: flex;
    }
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      display: none;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <app-root></app-root>
  <div class="loading">Cargando...</div>
</body>
</html>
